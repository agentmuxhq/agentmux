name: Copy Secrets

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy secrets to builder and S3
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
          A5AF_PACKAGES_TOKEN: ${{ secrets.A5AF_PACKAGES_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.TMP_AWS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TMP_AWS_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          TARGET="agentmuxai/agentmux-builder"

          # Copy to builder repo
          echo "$A5AF_PACKAGES_TOKEN" | gh secret set A5AF_PACKAGES_TOKEN --repo "$TARGET"
          echo "$APPLE_CERTIFICATE" | gh secret set APPLE_CERTIFICATE --repo "$TARGET"
          echo "$APPLE_CERTIFICATE_PASSWORD" | gh secret set APPLE_CERTIFICATE_PASSWORD --repo "$TARGET"
          echo "$APPLE_ID" | gh secret set APPLE_ID --repo "$TARGET"
          echo "$APPLE_PASSWORD" | gh secret set APPLE_PASSWORD --repo "$TARGET"
          echo "$APPLE_SIGNING_IDENTITY" | gh secret set APPLE_SIGNING_IDENTITY --repo "$TARGET"
          echo "$APPLE_TEAM_ID" | gh secret set APPLE_TEAM_ID --repo "$TARGET"

          # Also copy the admin PAT as checkout/release tokens
          echo "$GH_TOKEN" | gh secret set AGENTMUX_CHECKOUT_TOKEN --repo "$TARGET"
          echo "$GH_TOKEN" | gh secret set AGENTMUX_RELEASE_TOKEN --repo "$TARGET"

          echo "✅ Secrets copied to $TARGET"

          # Write to S3 for backup (using jq for safe JSON encoding)
          pip install awscli -q
          jq -n \
            --arg cert "$APPLE_CERTIFICATE" \
            --arg cert_pw "$APPLE_CERTIFICATE_PASSWORD" \
            --arg apple_id "$APPLE_ID" \
            --arg apple_pw "$APPLE_PASSWORD" \
            --arg sign_id "$APPLE_SIGNING_IDENTITY" \
            --arg team_id "$APPLE_TEAM_ID" \
            --arg pkg_token "$A5AF_PACKAGES_TOKEN" \
            '{
              "agentmux-apple-certificate": $cert,
              "agentmux-apple-certificate-password": $cert_pw,
              "agentmux-apple-id": $apple_id,
              "agentmux-apple-password": $apple_pw,
              "agentmux-apple-signing-identity": $sign_id,
              "agentmux-apple-team-id": $team_id,
              "agentmux-a5af-packages-token": $pkg_token
            }' > /tmp/secrets.json
          aws s3 cp /tmp/secrets.json s3://a5af-pulse-data-dev/tmp/agentmux-secrets.json --sse
          rm /tmp/secrets.json

          echo "✅ Backup written to S3"
