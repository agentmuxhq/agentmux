name: Build Tauri

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agentmuxsrv-rs
            wsh-rs
            src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Rust backend binaries
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")

          echo "Building agentmuxsrv-rs v$VERSION for ${{ matrix.target }}"
          cargo build --release -p agentmuxsrv-rs --target ${{ matrix.target }}

          echo "Building wsh-rs v$VERSION for ${{ matrix.target }}"
          cargo build --release -p wsh-rs --target ${{ matrix.target }}

          # Copy binaries to dist/bin with platform-specific names
          mkdir -p dist/bin
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/agentmuxsrv-rs.exe dist/bin/agentmuxsrv-rs.${{ matrix.arch }}.exe
            cp target/${{ matrix.target }}/release/wsh.exe dist/bin/wsh-${VERSION}-${{ matrix.platform }}.${{ matrix.arch }}.exe
          else
            cp target/${{ matrix.target }}/release/agentmuxsrv-rs dist/bin/agentmuxsrv-rs.${{ matrix.arch }}
            cp target/${{ matrix.target }}/release/wsh dist/bin/wsh-${VERSION}-${{ matrix.platform }}.${{ matrix.arch }}
          fi

          ls -lh dist/bin/

      - name: Verify version consistency
        shell: bash
        env:
          A5AF_PACKAGES_TOKEN: ${{ secrets.A5AF_PACKAGES_TOKEN }}
        run: |
          npm config set @a5af:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken "${A5AF_PACKAGES_TOKEN}"
          npm install -g @a5af/bump-cli
          bump verify

      - name: Copy sidecar binaries to Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries/bin
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp dist/bin/agentmuxsrv-rs.${{ matrix.arch }}.exe \
               src-tauri/binaries/agentmuxsrv-rs-${{ matrix.target }}.exe
            cp dist/bin/wsh-*-${{ matrix.platform }}.${{ matrix.arch }}.exe \
               src-tauri/binaries/wsh-${{ matrix.target }}.exe
            cp dist/bin/wsh-*-${{ matrix.platform }}.${{ matrix.arch }}.exe \
               src-tauri/binaries/bin/
          else
            cp dist/bin/agentmuxsrv-rs.${{ matrix.arch }} \
               src-tauri/binaries/agentmuxsrv-rs-${{ matrix.target }}
            cp dist/bin/wsh-*-${{ matrix.platform }}.${{ matrix.arch }} \
               src-tauri/binaries/wsh-${{ matrix.target }}
            cp dist/bin/wsh-*-${{ matrix.platform }}.${{ matrix.arch }} \
               src-tauri/binaries/bin/
          fi
          ls -lhR src-tauri/binaries/

      - name: Copy schema to dist
        shell: bash
        run: |
          mkdir -p dist/schema
          cp -r schema/* dist/schema/

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Create Windows portable ZIP
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          $buildDir = "target\${{ matrix.target }}\release"
          $outDir = "$buildDir\bundle\portable"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          & scripts\package-portable.ps1 -BuildDir $buildDir -OutputDir $outDir
          Get-ChildItem $outDir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentmux-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*
          retention-days: 30

  create-release:
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/AgentMux_*.dmg
            artifacts/**/AgentMux_*-setup.exe
            artifacts/**/agentmux-*-portable.zip
            artifacts/**/AgentMux_*.AppImage
            artifacts/**/AgentMux_*.deb
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## AgentMux ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 (installer) | `AgentMux_${{ github.ref_name }}_x64-setup.exe` |
            | Windows x64 (portable) | `agentmux-${{ github.ref_name }}-x64-portable.zip` |
            | macOS Apple Silicon | `AgentMux_${{ github.ref_name }}_aarch64.dmg` |
            | Linux x64 (AppImage) | `AgentMux_${{ github.ref_name }}_amd64.AppImage` |
            | Linux x64 (deb) | `AgentMux_${{ github.ref_name }}_amd64.deb` |

            **Full changelog:** https://github.com/agentmuxai/agentmux/commits/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
