name: Build Tauri

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
          - os: macos-13
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agentmuxsrv-rs
            wsh-rs
            src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Rust backend binaries
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")

          echo "Building agentmuxsrv-rs v$VERSION for ${{ matrix.target }}"
          cargo build --release -p agentmuxsrv-rs --target ${{ matrix.target }}

          echo "Building wsh-rs v$VERSION for ${{ matrix.target }}"
          cargo build --release -p wsh-rs --target ${{ matrix.target }}

          # Copy binaries to dist/bin with platform-specific names
          mkdir -p dist/bin
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp target/${{ matrix.target }}/release/agentmuxsrv-rs.exe dist/bin/agentmuxsrv-rs.${{ matrix.arch }}.exe
            cp target/${{ matrix.target }}/release/wsh.exe dist/bin/wsh-${VERSION}-${{ matrix.platform }}.${{ matrix.arch }}.exe
          else
            cp target/${{ matrix.target }}/release/agentmuxsrv-rs dist/bin/agentmuxsrv-rs.${{ matrix.arch }}
            cp target/${{ matrix.target }}/release/wsh dist/bin/wsh-${VERSION}-${{ matrix.platform }}.${{ matrix.arch }}
          fi

          ls -lh dist/bin/

      - name: Verify version consistency
        shell: bash
        run: bash scripts/verify-version.sh --strict

      - name: Copy sidecar binaries to Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.platform }}" = "windows" ]; then
            cp dist/bin/agentmuxsrv-rs.${{ matrix.arch }}.exe \
               src-tauri/binaries/agentmuxsrv-rs-${{ matrix.target }}.exe
            cp dist/bin/wsh-*-${{ matrix.platform }}.${{ matrix.arch }}.exe \
               src-tauri/binaries/wsh-${{ matrix.target }}.exe
          else
            cp dist/bin/agentmuxsrv-rs.${{ matrix.arch }} \
               src-tauri/binaries/agentmuxsrv-rs-${{ matrix.target }}
            cp dist/bin/wsh-*-${{ matrix.platform }}.${{ matrix.arch }} \
               src-tauri/binaries/wsh-${{ matrix.target }}
          fi
          ls -lh src-tauri/binaries/

      - name: Build frontend
        run: npm run build:prod

      - name: Copy schema to dist
        shell: bash
        run: |
          mkdir -p dist/schema
          cp -r schema/* dist/schema/

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentmux-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          retention-days: 30

  create-release:
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.sig
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
