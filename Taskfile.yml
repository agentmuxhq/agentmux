version: "3"

# Load machine-local env overrides (gitignored).
# Use .env to extend PATH with cargo, node, brew, etc.
# Windows: cargo/node are usually in PATH from their installers — no .env needed.
# macOS/Linux: create .env with e.g. PATH=/home/user/.cargo/bin:/opt/homebrew/bin:...
dotenv: [".env"]

vars:
    APP_NAME: "AgentMux"
    BIN_DIR: "bin"
    VERSION:
        sh: 'PATH="$HOME/.cargo/bin:/opt/homebrew/opt/node@20/bin:/opt/homebrew/bin:/usr/local/bin:$PATH" node version.cjs'
    RM: '{{if eq OS "windows"}}powershell Remove-Item -Force -ErrorAction SilentlyContinue{{else}}rm -f{{end}}'
    RMRF: '{{if eq OS "windows"}}powershell Remove-Item -Force -Recurse -ErrorAction SilentlyContinue{{else}}rm -rf{{end}}'
    DATE: '{{if eq OS "windows"}}powershell Get-Date -UFormat{{else}}date{{end}}'
    ARTIFACTS_BUCKET: agentmux-github-artifacts/staging
    RELEASES_BUCKET: dl.agentmux.ai/releases
    WINGET_PACKAGE: AgentMux.AgentMux

tasks:
    dev:
        desc: Run AgentMux in development mode (CEF host + Vite hot reload).
        cmds:
            - task: cef:dev
        env:
            AGENTMUX_ENVFILE: "{{.ROOT_DIR}}/.env"

    dev:tauri:
        desc: "[DEPRECATED] Run the Tauri application in development mode."
        cmd: npx tauri dev --config src-tauri/tauri.dev.conf.json
        deps:
            - npm:install
            - build:backend
            - sync:dev:binaries
            - copy:schema
        env:
            AGENTMUX_ENVFILE: "{{.ROOT_DIR}}/.env"
            WCLOUD_ENDPOINT: "https://api-dev.agentmux.ai/central"
            WCLOUD_WS_ENDPOINT: "wss://wsapi-dev.agentmux.ai"
            VITE_PLATFORM: "{{OS}}"

    sync:dev:binaries:
        desc: Sync built binaries to Tauri dev/release cache (prevents stale binary issues)
        cmds:
            - task: sync:dev:binaries:{{OS}}

    sync:dev:binaries:windows:
        internal: true
        platforms: [windows]
        cmds:
            - powershell Copy-Item -Force dist/bin/agentmux-srv-{{.VERSION}}-windows.x64.exe src-tauri/target/debug/agentmux-srv.exe -ErrorAction SilentlyContinue
            - powershell Copy-Item -Force dist/bin/agentmux-srv-{{.VERSION}}-windows.x64.exe src-tauri/target/release/agentmux-srv.exe -ErrorAction SilentlyContinue
            - powershell Copy-Item -Force dist/bin/agentmux-srv-{{.VERSION}}-windows.x64.exe src-tauri/binaries/agentmux-srv-x86_64-pc-windows-msvc.exe -ErrorAction SilentlyContinue
            - echo "✓ Synced agentmux-srv to Tauri dev/release cache (Windows)"

    sync:dev:binaries:darwin:
        internal: true
        platforms: [darwin]
        cmds:
            - mkdir -p src-tauri/target/debug/bin src-tauri/target/release/bin
            - cp -f dist/bin/agentmux-srv-{{.VERSION}}-darwin.arm64 src-tauri/target/debug/agentmux-srv || true
            - cp -f dist/bin/agentmux-srv-{{.VERSION}}-darwin.arm64 src-tauri/target/release/agentmux-srv || true
            - cp -f dist/bin/agentmux-wsh-{{.VERSION}}-darwin.arm64 src-tauri/target/debug/bin/ || true
            - cp -f dist/bin/agentmux-wsh-{{.VERSION}}-darwin.arm64 src-tauri/target/release/bin/ || true
            - cp -f dist/bin/agentmux-wsh-{{.VERSION}}-darwin.x64 src-tauri/target/debug/bin/ || true
            - cp -f dist/bin/agentmux-wsh-{{.VERSION}}-darwin.x64 src-tauri/target/release/bin/ || true
            - echo "✓ Synced agentmux-srv + agentmux-wsh to Tauri dev/release cache (macOS)"

    sync:dev:binaries:linux:
        internal: true
        platforms: [linux]
        cmds:
            - mkdir -p src-tauri/target/debug src-tauri/target/release src-tauri/binaries
            - cp -f dist/bin/agentmux-srv-{{.VERSION}}-linux.x64 src-tauri/target/debug/agentmux-srv || true
            - cp -f dist/bin/agentmux-srv-{{.VERSION}}-linux.x64 src-tauri/target/release/agentmux-srv || true
            - cp -f dist/bin/agentmux-srv-{{.VERSION}}-linux.x64 src-tauri/binaries/agentmux-srv-x86_64-unknown-linux-gnu || true
            - echo "✓ Synced agentmux-srv to Tauri dev/release cache (Linux)"

    start:
        desc: Build and run the Tauri application in production mode (no installer).
        cmd: cd src-tauri && cargo run --release
        deps:
            - npm:install
            - build:backend
            - copy:schema
        env:
            AGENTMUX_ENVFILE: "{{.ROOT_DIR}}/.env"
            WCLOUD_ENDPOINT: "https://api-dev.agentmux.ai/central"
            WCLOUD_WS_ENDPOINT: "wss://wsapi-dev.agentmux.ai"
            VITE_PLATFORM: "{{OS}}"

    quickdev:
        desc: Run the Tauri application in quick dev mode (no docsite, no wsh).
        cmd: tauri dev --config src-tauri/tauri.dev.conf.json
        deps:
            - npm:install
            - build:backend:rust
            - copy:schema
        env:
            AGENTMUX_ENVFILE: "{{.ROOT_DIR}}/.env"
            WCLOUD_ENDPOINT: "https://api-dev.agentmux.ai/central"
            WCLOUD_WS_ENDPOINT: "wss://wsapi-dev.agentmux.ai/"
            VITE_PLATFORM: "{{OS}}"

    storybook:
        desc: Start the Storybook server.
        cmd: npm run storybook
        deps:
            - npm:install

    storybook:build:
        desc: Build the Storybook static site.
        cmd: npm run build-storybook
        generates:
            - storybook-static/**/*
        deps:
            - npm:install

    copy:schema:
        desc: Copy schema directory to dist for Tauri bundling
        cmds:
            - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path dist/schema | Out-Null; Copy-Item schema/* dist/schema/ -Recurse -Force"
              platforms: [windows]
            - cmd: mkdir -p dist/schema && cp -r schema/* dist/schema/
              platforms: [linux, darwin]

    package:
        desc: Package the application for the current platform (Tauri).
        env:
            VITE_PLATFORM: "{{OS}}"
        cmds:
            - task: build:backend
            - task: tauri:copy-sidecars
            - task: copy:schema
            - npx tauri build {{.CLI_ARGS}}
            # On Linux: patch the AppImage AppRun after Tauri/linuxdeploy creates it.
            # linuxdeploy's default AppRun sources a GTK hook that forces GDK_BACKEND=x11
            # (breaking Wayland) and does NOT set WEBKIT_DISABLE_DMABUF_RENDERER=1
            # (causing the WebKit window to silently not appear on some systems).
            - cmd: |
                if [ "$(uname)" != "Linux" ]; then exit 0; fi
                APPDIR="target/release/bundle/appimage/AgentMux.AppDir"
                if [ ! -d "$APPDIR" ]; then
                  echo "⚠ AppDir not found — skipping AppRun patch (non-AppImage build?)"
                  exit 0
                fi
                # Strip bundled system libs — WebKitGTK and GTK3 must come from the
                # host system so WebKit can locate its subprocess binaries (WebKitNetworkProcess
                # etc.) at the correct system paths. Bundling them causes "No such file or
                # directory" crashes when WebKit tries to spawn subprocesses via relative paths.
                rm -rf "$APPDIR/usr/lib"
                echo "✓ Stripped bundled system libraries (using host WebKitGTK)"
                rm -rf "$APPDIR/apprun-hooks"
                # Replace .DirIcon symlink with a real file copy so the icon resolves
                # after distribution (absolute symlinks to the build machine's AppDir path
                # are broken on any other machine / after the build tree is removed).
                if [ -L "$APPDIR/.DirIcon" ] || [ ! -f "$APPDIR/.DirIcon" ]; then
                  rm -f "$APPDIR/.DirIcon"
                  cp "$APPDIR/AgentMux.png" "$APPDIR/.DirIcon"
                  echo "✓ Replaced .DirIcon symlink with file copy"
                fi
                cp scripts/linux-apprun.sh "$APPDIR/AppRun"
                chmod +x "$APPDIR/AppRun"
                echo "✓ Patched AppRun (WEBKIT_DISABLE_DMABUF_RENDERER=1, GDK_BACKEND auto)"
                VERSION=$(node version.cjs)
                OUTPUT="target/release/bundle/appimage/AgentMux_${VERSION}_amd64.AppImage"
                ARCH=x86_64 appimagetool "$APPDIR" "$OUTPUT" 2>&1
                echo "✅ Repackaged AppImage: $OUTPUT"
        deps:
            - clean
            - npm:install


    package:portable:
        desc: Package the application as a portable ZIP bundle (Windows only).
        platforms: [windows]
        cmds:
            - task: package
            - powershell -ExecutionPolicy Bypass -Command "& ./scripts/package-portable.ps1"

    package:msix:
        desc: Package for Windows Store (MSIX). Run 'task package' first, or pass --Publisher.
        platforms: [windows]
        cmds:
            - powershell -ExecutionPolicy Bypass -File scripts/package-msix.ps1 {{.CLI_ARGS}}

    package:macos:
        desc: Package the application for macOS (creates .app and .dmg).
        platforms: [darwin]
        cmds:
            - task: build:backend
            - task: tauri:copy-sidecars
            - task: copy:schema
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:/opt/homebrew/opt/node@20/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$PATH" npx tauri build --bundles app {{.CLI_ARGS}}'
            - |
                VERSION=$(node -p "require('./package.json').version")
                APP=target/release/bundle/macos/AgentMux.app
                OUT=target/release/bundle/macos/AgentMux_${VERSION}_aarch64.dmg
                echo "Creating DMG from $APP..."
                hdiutil create -volname "AgentMux-${VERSION}" -srcfolder "$APP" -ov -format UDZO "$OUT"
                echo "✓ DMG created: $OUT"
                if [ -d "$HOME/Desktop" ]; then
                  cp "$OUT" "$HOME/Desktop/"
                  echo "✓ Copied to Desktop: AgentMux_${VERSION}_aarch64.dmg"
                fi
        deps:
            - clean
            - npm:install


    package:portable:linux:
        desc: Package the application as a portable AppImage (Linux only).
        platforms: [linux]
        cmds:
            - task: build:backend
            - task: tauri:copy-sidecars
            - task: copy:schema
            # Tauri prepares the AppDir but linuxdeploy crashes on some systems.
            # We ignore the linuxdeploy failure and run appimagetool directly.
            - npx tauri build --bundles appimage {{.CLI_ARGS}} 2>&1 | grep -v "failed to run linuxdeploy" || true
            - cmd: |
                APPDIR="target/release/bundle/appimage/AgentMux.AppDir"
                if [ ! -d "$APPDIR" ]; then
                  echo "❌ AppDir not found — Tauri build failed before linuxdeploy stage"
                  exit 1
                fi
                # Remove bundled system libraries — WebKitGTK, GTK3, glib, etc. are
                # system dependencies on Linux and should not be shipped in the AppImage.
                # Bundling them bloats the image from ~15MB to ~90MB.
                rm -rf "$APPDIR/usr/lib"
                echo "✓ Stripped bundled system libraries from AppDir"

                # Remove linuxdeploy GTK hook — it sets GDK_BACKEND=x11 which forces
                # XWayland and triggers the IBus backspace bug.
                rm -rf "$APPDIR/apprun-hooks"
                echo "✓ Removed linuxdeploy hooks (GDK_BACKEND=x11)"

                # Replace AppRun with custom script that sets required env vars
                # and self-registers icon/desktop for GNOME taskbar icon matching.
                printf '%s\n' '#!/usr/bin/env bash' \
                  'set -e' \
                  'this_dir="$(readlink -f "$(dirname "$0")")"' \
                  'export APPDIR="$this_dir"' \
                  'export WEBKIT_DISABLE_DMABUF_RENDERER=1' \
                  '# Force native Wayland — XWayland + IBus XIM causes Backspace bugs.' \
                  'export GDK_BACKEND=wayland' \
                  'export XMODIFIERS=""' \
                  'export GTK_IM_MODULE=gtk-im-context-simple' \
                  '# Self-register icon and .desktop for GNOME Shell taskbar icon matching.' \
                  'if [ -n "$APPIMAGE" ]; then' \
                  '  _icon_dir="$HOME/.local/share/icons/hicolor/256x256/apps"' \
                  '  _apps_dir="$HOME/.local/share/applications"' \
                  '  _desktop="$_apps_dir/agentmux.desktop"' \
                  '  mkdir -p "$_icon_dir" "$_apps_dir"' \
                  '  cp -f "$this_dir/AgentMux.png" "$_icon_dir/agentmux.png"' \
                  '  _cur=$(grep -m1 "^Exec=" "$_desktop" 2>/dev/null | cut -d= -f2- || true)' \
                  '  if [ "$_cur" != "$APPIMAGE" ]; then' \
                  '    sed "s|^Exec=.*|Exec=$APPIMAGE|" "$this_dir/AgentMux.desktop" > "$_desktop"' \
                  '    update-desktop-database "$_apps_dir" 2>/dev/null || true' \
                  '    gtk-update-icon-cache -f "$HOME/.local/share/icons/hicolor" 2>/dev/null || true' \
                  '  fi' \
                  'fi' \
                  'exec "$this_dir/usr/bin/agentmux" "$@"' \
                  > "$APPDIR/AppRun"
                chmod +x "$APPDIR/AppRun"
                echo "✓ Replaced AppRun with custom script"

                # Ensure lowercase icon exists (desktop file references 'agentmux')
                [ -f "$APPDIR/agentmux.png" ] || cp "$APPDIR/AgentMux.png" "$APPDIR/agentmux.png"

                # Fix .DirIcon symlink (must point to existing file)
                rm -f "$APPDIR/.DirIcon"
                ln -s AgentMux.png "$APPDIR/.DirIcon"

                VERSION=$(node version.cjs)
                OUTPUT="target/release/bundle/appimage/AgentMux_${VERSION}_amd64.AppImage"
                ARCH=x86_64 appimagetool "$APPDIR" "$OUTPUT"
                echo "✅ AppImage created: $OUTPUT"
        deps:
            - clean
            - npm:install

    desktop:
        desc: Clear desktop and deploy latest AppImage with trusted .desktop launcher.
        platforms: [linux]
        cmds:
            - cmd: |
                rm -f "$HOME/Desktop"/AgentMux_*
                echo "✓ Cleared old AppImage files from Desktop"
                VERSION=$(node version.cjs)
                SRC="target/release/bundle/appimage/AgentMux_${VERSION}_amd64.AppImage"
                if [ ! -f "$SRC" ]; then
                  echo "❌ AppImage not found: $SRC"
                  exit 1
                fi
                cp "$SRC" "$HOME/Desktop/"
                chmod +x "$HOME/Desktop/AgentMux_${VERSION}_amd64.AppImage"
                echo "✅ Deployed to Desktop: AgentMux_${VERSION}_amd64.AppImage"
                # Pre-register icon and desktop files so GNOME shows the correct icon
                # immediately, before the app is run for the first time.
                # AppRun repeats this at runtime to keep paths current.
                APPDIR="target/release/bundle/appimage/AgentMux.AppDir"
                APPIMAGE_PATH="$HOME/Desktop/AgentMux_${VERSION}_amd64.AppImage"
                ICON_DIR="$HOME/.local/share/icons/hicolor/256x256/apps"
                APPS_DIR="$HOME/.local/share/applications"
                mkdir -p "$ICON_DIR" "$APPS_DIR"
                if [ -f "$APPDIR/AgentMux.png" ]; then
                  cp -f "$APPDIR/AgentMux.png" "$ICON_DIR/agentmux.png"
                  echo "✓ Pre-registered icon in hicolor theme"
                fi
                # Register agentmux.desktop — Wayland app_id and X11 WM_CLASS both equal
                # the binary name "agentmux", so only this one file is needed.
                _desktop_content=$(sed "s|^Exec=.*|Exec=$APPIMAGE_PATH|" "$APPDIR/AgentMux.desktop")
                printf '%s\n' "$_desktop_content" > "$APPS_DIR/agentmux.desktop"
                # Ensure hicolor has an index.theme so gtk-update-icon-cache succeeds
                if [ ! -f "$HOME/.local/share/icons/hicolor/index.theme" ]; then
                  cp /usr/share/icons/hicolor/index.theme "$HOME/.local/share/icons/hicolor/index.theme" 2>/dev/null || true
                fi
                update-desktop-database "$APPS_DIR" 2>/dev/null || true
                gtk-update-icon-cache -f "$HOME/.local/share/icons/hicolor" 2>/dev/null || true
                echo "✓ Registered desktop file: agentmux.desktop"
                # Create trusted .desktop launcher on Desktop for double-click support
                DESKTOP_FILE="$HOME/Desktop/AgentMux.desktop"
                sed "s|^Exec=.*|Exec=$APPIMAGE_PATH|" "$APPDIR/AgentMux.desktop" > "$DESKTOP_FILE"
                chmod +x "$DESKTOP_FILE"
                # Trust the .desktop file for GNOME
                gio set "$DESKTOP_FILE" metadata::trusted true 2>/dev/null || true
                echo "✅ Created trusted .desktop launcher"


    build:frontend:
        desc: Build the frontend (production mode).
        cmd: npx vite build --mode production --config vite.config.tauri.ts
        deps:
            - npm:install
        env:
            VITE_PLATFORM: "{{OS}}"

    build:frontend:dev:
        desc: Build the frontend in development mode.
        cmd: npx vite build --mode dev --config vite.config.tauri.ts
        deps:
            - npm:install
        env:
            VITE_PLATFORM: "{{OS}}"

    build:backend:
        desc: Build the agentmux-srv and agentmux-wsh Rust components.
        cmds:
            - task: build:backend:rust
            - task: build:wsh

    # ========================================
    # Rust Backend Build Tasks
    # ========================================

    build:backend:rust:
        desc: Build the agentmux-srv Rust backend binary.
        cmds:
            - task: build:backend:rust:{{OS}}

    build:backend:rust:darwin:
        internal: true
        platforms: [darwin]
        cmds:
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:$PATH" cargo build --release -p agentmux-srv'
            - mkdir -p dist/bin
            - cmd: powershell -Command "Remove-Item dist/bin/agentmux-srv-*-darwin.arm64 -Force -ErrorAction SilentlyContinue"
            - cp target/release/agentmux-srv dist/bin/agentmux-srv-{{.VERSION}}-darwin.arm64
            - echo "✓ Built agentmux-srv-{{.VERSION}} for macOS"

    build:backend:rust:linux:
        internal: true
        platforms: [linux]
        cmds:
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:$PATH" cargo build --release -p agentmux-srv'
            - mkdir -p dist/bin
            - rm -f dist/bin/agentmux-srv-*-linux.x64
            - cp target/release/agentmux-srv dist/bin/agentmux-srv-{{.VERSION}}-linux.x64
            - echo "✓ Built agentmux-srv-{{.VERSION}} for Linux"

    build:backend:rust:windows:
        internal: true
        platforms: [windows]
        cmds:
            - cargo build --release -p agentmux-srv
            - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path dist/bin | Out-Null; Remove-Item dist/bin/agentmux-srv-*-windows.x64.exe -Force -ErrorAction SilentlyContinue; Copy-Item target/release/agentmux-srv.exe dist/bin/agentmux-srv-{{.VERSION}}-windows.x64.exe -Force"
            - echo "✓ Built agentmux-srv-{{.VERSION}} for Windows"

    # ========================================
    # agentmux-wsh (Rust) Build Tasks
    # ========================================

    build:wsh:
        desc: Build the agentmux-wsh component for the current platform.
        cmds:
            - task: build:wsh:{{OS}}
        sources:
            - "agentmux-wsh/src/**/*.rs"
            - "agentmux-wsh/Cargo.toml"
        generates:
            - "dist/bin/agentmux-wsh*"

    build:wsh:windows:
        internal: true
        platforms: [windows]
        cmds:
            - cargo build --release -p agentmux-wsh
            - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path dist/bin | Out-Null; Remove-Item dist/bin/agentmux-wsh-*-windows.x64.exe -Force -ErrorAction SilentlyContinue; Copy-Item target/release/agentmux-wsh.exe dist/bin/agentmux-wsh-{{.VERSION}}-windows.x64.exe -Force"
            - echo "✓ Built agentmux-wsh-{{.VERSION}} for Windows"

    build:wsh:darwin:
        internal: true
        platforms: [darwin]
        cmds:
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:$PATH" cargo build --release -p agentmux-wsh'
            - mkdir -p dist/bin
            - rm -f dist/bin/agentmux-wsh-*-darwin.arm64
            - cp target/release/agentmux-wsh dist/bin/agentmux-wsh-{{.VERSION}}-darwin.arm64
            - echo "✓ Built agentmux-wsh-{{.VERSION}} for macOS"

    build:wsh:linux:
        internal: true
        platforms: [linux]
        cmds:
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:$PATH" cargo build --release -p agentmux-wsh'
            - mkdir -p dist/bin
            - rm -f dist/bin/agentmux-wsh-*-linux.x64
            - cp target/release/agentmux-wsh dist/bin/agentmux-wsh-{{.VERSION}}-linux.x64
            - echo "✓ Built agentmux-wsh-{{.VERSION}} for Linux"

    outdated:
        desc: Check for outdated packages using npm-check-updates.
        cmd: npx npm-check-updates@latest

    version:
        desc: Get the current package version, or bump version if args are present. To pass args to `version.cjs`, add them after `--`. See `version.cjs` for usage definitions for the arguments.
        cmd: node version.cjs {{.CLI_ARGS}}

    artifacts:upload:
        desc: Uploads build artifacts to the staging bucket in S3. To add additional AWS CLI arguments, add them after `--`.
        vars:
            ORIGIN: "src-tauri/target/release/bundle/"
            DESTINATION: "{{.ARTIFACTS_BUCKET}}/{{.VERSION}}"
        cmd: aws s3 cp {{.ORIGIN}}/ s3://{{.DESTINATION}}/ --recursive --exclude "*/*" --exclude "builder-*.yml" {{.CLI_ARGS}}

    artifacts:download:*:
        desc: Downloads the specified artifacts version from the staging bucket. To add additional AWS CLI arguments, add them after `--`.
        vars:
            DL_VERSION: '{{ replace "v" "" (index .MATCH 0)}}'
            ORIGIN: "{{.ARTIFACTS_BUCKET}}/{{.DL_VERSION}}"
            DESTINATION: "artifacts/{{.DL_VERSION}}"
        cmds:
            - '{{.RMRF}} "{{.DESTINATION}}"'
            - aws s3 cp s3://{{.ORIGIN}}/ {{.DESTINATION}}/ --recursive {{.CLI_ARGS}}

    artifacts:publish:*:
        desc: Publishes the specified artifacts version from the staging bucket to the releases bucket. To add additional AWS CLI arguments, add them after `--`.
        vars:
            UP_VERSION: '{{ replace "v" "" (index .MATCH 0)}}'
            ORIGIN: "{{.ARTIFACTS_BUCKET}}/{{.UP_VERSION}}"
            DESTINATION: "{{.RELEASES_BUCKET}}"
        cmd: |
            OUTPUT=$(aws s3 cp s3://{{.ORIGIN}}/ s3://{{.DESTINATION}}/ --recursive {{.CLI_ARGS}})

            for line in $OUTPUT; do
                PREFIX=${line%%{{.DESTINATION}}*}
                SUFFIX=${line:${#PREFIX}}
                if [[ -n "$SUFFIX" ]]; then
                    echo "https://$SUFFIX"
                fi
            done
    artifacts:snap:publish:*:
        desc: Publishes the specified artifacts version to Snapcraft.
        vars:
            UP_VERSION: '{{ replace "v" "" (index .MATCH 0)}}'
            CHANNEL: '{{if contains "beta" .UP_VERSION}}beta{{else}}beta,stable{{end}}'
        cmd: |
            echo "Releasing to channels: [{{.CHANNEL}}]"
            for file in agentmux_{{.UP_VERSION}}_*.snap; do
                echo "Publishing $file"
                snapcraft upload --release={{.CHANNEL}} $file
                echo "Finished publishing $file"
            done

    artifacts:winget:publish:*:
        desc: Submits a version bump request to WinGet for the latest release.
        status:
            - exit {{if contains "beta" .UP_VERSION}}0{{else}}1{{end}}
        vars:
            UP_VERSION: '{{ replace "v" "" (index .MATCH 0)}}'
        cmd: |
            wingetcreate update {{.WINGET_PACKAGE}} -s -v {{.UP_VERSION}} -u "https://{{.RELEASES_BUCKET}}/{{.APP_NAME}}-win32-x64-{{.UP_VERSION}}.msi" -t {{.GITHUB_TOKEN}}

    dev:installwsh:
        desc: Quick shortcut to rebuild agentmux-wsh and install for macOS arm64
        platforms: [darwin]
        requires:
            vars:
                - VERSION
        cmds:
            - task: build:wsh:darwin
            - cp dist/bin/agentmux-wsh-{{.VERSION}}-darwin.arm64 ~/Library/Application\ Support/agentmux-dev/bin/agentmux-wsh

    dev:clearconfig:
        desc: Clear the config directory for agentmux-dev
        cmd: "{{.RMRF}} ~/.config/agentmux-dev"

    dev:cleardata:
        desc: Clear the data directory for agentmux-dev
        cmds:
            - task: dev:cleardata:windows
            - task: dev:cleardata:linux
            - task: dev:cleardata:macos

    init:
        desc: Initialize the project for development.
        cmds:
            - npm install

    dev:cleardata:windows:
        internal: true
        platforms: [windows]
        cmd: '{{.RMRF}} %LOCALAPPDATA%\agentmux-dev\Data'

    dev:cleardata:linux:
        internal: true
        platforms: [linux]
        cmd: "rm -rf ~/.local/share/agentmux-dev"

    dev:cleardata:macos:
        internal: true
        platforms: [darwin]
        cmd: 'rm -rf ~/Library/Application\ Support/agentmux-dev'

    npm:install:
        desc: Runs `npm install`
        internal: true
        generates:
            - node_modules/**/*
            - package-lock.json
        sources:
            - package-lock.json
            - package.json
        cmd: npm install

    copyfiles:*:*:
        desc: Recursively copy directory and its contents.
        internal: true
        cmd: '{{if eq OS "windows"}}powershell Copy-Item -Recurse -Force -Path {{index .MATCH 0}} -Destination {{index .MATCH 1}}{{else}}mkdir -p "$(dirname {{index .MATCH 1}})" && cp -r {{index .MATCH 0}} {{index .MATCH 1}}{{end}}'

    clean:
        desc: clean dist directories
        cmds:
            - cmd: '{{.RMRF}} "dist"'
              ignore_error: true

    tsunami:demo:todo:
        desc: Run the tsunami todo demo application
        cmd: go run demo/todo/*.go
        dir: tsunami
        env:
            TSUNAMI_LISTENADDR: "localhost:12026"

    tsunami:frontend:dev:
        desc: Run the tsunami frontend vite dev server
        cmd: npm run dev
        dir: tsunami/frontend

    tsunami:frontend:build:
        desc: Build the tsunami frontend
        cmd: npm run build
        dir: tsunami/frontend

    tsunami:frontend:devbuild:
        desc: Build the tsunami frontend in development mode (with source maps and symbols)
        cmd: npm run build:dev
        dir: tsunami/frontend

    tsunami:scaffold:
        desc: Build scaffold for tsunami frontend development
        deps:
            - tsunami:frontend:build
        cmds:
            - task: tsunami:scaffold:internal

    tsunami:devscaffold:
        desc: Build scaffold for tsunami frontend development (with source maps and symbols)
        deps:
            - tsunami:frontend:devbuild
        cmds:
            - task: tsunami:scaffold:internal

    tsunami:scaffold:packagejson:
        desc: Create package.json for tsunami scaffold using npm commands
        dir: tsunami/frontend/scaffold
        cmds:
            - cmd: "{{.RM}} package.json"
              ignore_error: true
            - npm --no-workspaces init -y --init-license Apache-2.0
            - npm pkg set name=tsunami-scaffold
            - npm pkg delete author
            - npm pkg set author.name="AgentMux Corp"
            - npm --no-workspaces install tailwindcss@4.1.13 @tailwindcss/cli@4.1.13

    tsunami:scaffold:internal:
        desc: Internal task to create scaffold directory structure
        dir: tsunami/frontend
        internal: true
        cmds:
            - cmd: "{{.RMRF}} scaffold"
              ignore_error: true
            - mkdir scaffold
            - cp ../templates/package.json.tmpl scaffold/package.json
            - cd scaffold && npm install
            - cp -r dist scaffold/
            - cp ../templates/app-main.go.tmpl scaffold/app-main.go
            - cp ../templates/tailwind.css scaffold/
            - cp ../templates/gitignore.tmpl scaffold/.gitignore

    tsunami:build:
        desc: Build the tsunami binary.
        cmds:
            - cmd: "{{.RM}} bin/tsunami*"
              ignore_error: true
            - mkdir -p bin
            - cd tsunami && go build -ldflags "-X main.BuildTime=$({{.DATE}} +'%Y%m%d%H%M') -X main.TsunamiVersion={{.VERSION}}" -o ../bin/tsunami{{exeExt}} cmd/main-tsunami.go
        sources:
            - "tsunami/**/*.go"
            - "tsunami/go.mod"
            - "tsunami/go.sum"
        generates:
            - "bin/tsunami{{exeExt}}"

    tsunami:clean:
        desc: Clean tsunami frontend build artifacts
        dir: tsunami/frontend
        cmds:
            - cmd: "{{.RMRF}} dist"
              ignore_error: true
            - cmd: "{{.RMRF}} scaffold"
              ignore_error: true

    tsunami:godoc:
        desc: Start the Go documentation server for the tsunami module
        cmd: $(go env GOPATH)/bin/pkgsite -http=:6060
        dir: tsunami

    # ========================================
    # Tauri Build Tasks
    # ========================================

    tauri:dev:
        desc: Run Tauri in development mode
        cmds:
            - task: build:backend
            - task: tauri:copy-sidecars
            - task: copy:schema
            - npm run tauri:dev
        deps:
            - npm:install

    tauri:build:
        desc: Build Tauri application for current platform
        cmds:
            - task: build:frontend:prod
            - task: build:backend
            - task: tauri:copy-sidecars
            - npx tauri build
        deps:
            - npm:install

    tauri:copy-sidecars:
        desc: "[DEPRECATED] Copy agentmux-srv and agentmux-wsh binaries to src-tauri/binaries (Tauri host is deprecated)"
        cmds:
            - mkdir -p src-tauri/binaries
            - |
                {{if eq OS "windows"}}
                powershell -Command "Copy-Item dist/bin/agentmux-srv-{{.VERSION}}-windows.x64.exe src-tauri/binaries/agentmux-srv-x86_64-pc-windows-msvc.exe -Force; Copy-Item dist/bin/agentmux-wsh-{{.VERSION}}-windows.x64.exe src-tauri/binaries/agentmux-wsh-x86_64-pc-windows-msvc.exe -Force; Write-Host 'Copied binaries for x86_64-pc-windows-msvc'"
                {{else}}
                TRIPLE=$(rustc -vV | grep host | awk '{print $2}');
                {{if eq OS "darwin"}}
                cp dist/bin/agentmux-srv-{{.VERSION}}-darwin.arm64 src-tauri/binaries/agentmux-srv-$TRIPLE 2>/dev/null || cp dist/bin/agentmux-srv-{{.VERSION}}-darwin.x64 src-tauri/binaries/agentmux-srv-$TRIPLE;
                cp dist/bin/agentmux-wsh-{{.VERSION}}-darwin.arm64 src-tauri/binaries/agentmux-wsh-$TRIPLE 2>/dev/null || cp dist/bin/agentmux-wsh-{{.VERSION}}-darwin.x64 src-tauri/binaries/agentmux-wsh-$TRIPLE;
                {{else}}
                cp dist/bin/agentmux-srv-{{.VERSION}}-linux.x64 src-tauri/binaries/agentmux-srv-$TRIPLE;
                cp dist/bin/agentmux-wsh-{{.VERSION}}-linux.x64 src-tauri/binaries/agentmux-wsh-$TRIPLE;
                {{end}}
                echo "Copied binaries for $TRIPLE"
                {{end}}
            # Copy agentmux-wsh for backend shell integration deployment
            - |
                {{if eq OS "windows"}}
                powershell -Command "New-Item -ItemType Directory -Force -Path src-tauri/binaries/bin | Out-Null; Remove-Item src-tauri/binaries/bin/agentmux-wsh-* -Force -ErrorAction SilentlyContinue; Copy-Item dist/bin/agentmux-wsh-{{.VERSION}}-windows.x64.exe src-tauri/binaries/bin/ -Force; Write-Host 'Copied agentmux-wsh to bin/ for backend deployment'"
                {{else if eq OS "darwin"}}
                rm -f src-tauri/binaries/bin/agentmux-wsh-*;
                mkdir -p src-tauri/binaries/bin;
                cp dist/bin/agentmux-wsh-{{.VERSION}}-darwin.arm64 src-tauri/binaries/bin/ 2>/dev/null || true;
                cp dist/bin/agentmux-wsh-{{.VERSION}}-darwin.x64 src-tauri/binaries/bin/ 2>/dev/null || true;
                echo "Copied agentmux-wsh to bin/ for backend deployment"
                {{else}}
                rm -f src-tauri/binaries/bin/agentmux-wsh-*;
                mkdir -p src-tauri/binaries/bin;
                cp dist/bin/agentmux-wsh-{{.VERSION}}-linux.* src-tauri/binaries/bin/ 2>/dev/null || true;
                echo "Copied agentmux-wsh to bin/ for backend deployment"
                {{end}}

    # ========================================
    # CEF Host Build Tasks
    # ========================================

    cef:build:
        desc: Build the CEF host binary for the current platform.
        cmds:
            - task: cef:build:{{OS}}

    cef:build:windows:
        internal: true
        platforms: [windows]
        cmds:
            - cargo build --release -p agentmux-cef -p agentmux-launcher
            - cmd: powershell -Command "New-Item -ItemType Directory -Force -Path dist/cef | Out-Null; Remove-Item dist/cef/agentmux-cef-*-windows.x64.exe -Force -ErrorAction SilentlyContinue; Copy-Item target/release/agentmux-cef.exe dist/cef/agentmux-cef-{{.VERSION}}-windows.x64.exe -Force; Remove-Item dist/cef/agentmux-launcher-*-windows.x64.exe -Force -ErrorAction SilentlyContinue; Copy-Item target/release/agentmux-launcher.exe dist/cef/agentmux-launcher-{{.VERSION}}-windows.x64.exe -Force"
            - echo "✓ Built agentmux-cef-{{.VERSION}} and agentmux-launcher-{{.VERSION}} for Windows"

    cef:build:darwin:
        internal: true
        platforms: [darwin]
        cmds:
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:$PATH" cargo build --release -p agentmux-cef -p agentmux-launcher'
            - mkdir -p dist/cef
            - rm -f dist/cef/agentmux-cef-*-darwin.arm64 dist/cef/agentmux-launcher-*-darwin.arm64
            - cp target/release/agentmux-cef dist/cef/agentmux-cef-{{.VERSION}}-darwin.arm64
            - cp target/release/agentmux-launcher dist/cef/agentmux-launcher-{{.VERSION}}-darwin.arm64
            - echo "✓ Built agentmux-cef-{{.VERSION}} and agentmux-launcher-{{.VERSION}} for macOS"

    cef:build:linux:
        internal: true
        platforms: [linux]
        cmds:
            - bash -c 'source "$HOME/.cargo/env" 2>/dev/null; PATH="$HOME/.cargo/bin:$PATH" cargo build --release -p agentmux-cef -p agentmux-launcher'
            - mkdir -p dist/cef
            - rm -f dist/cef/agentmux-cef-*-linux.x64 dist/cef/agentmux-launcher-*-linux.x64
            - cp target/release/agentmux-cef dist/cef/agentmux-cef-{{.VERSION}}-linux.x64
            - cp target/release/agentmux-launcher dist/cef/agentmux-launcher-{{.VERSION}}-linux.x64
            - echo "✓ Built agentmux-cef-{{.VERSION}} and agentmux-launcher-{{.VERSION}} for Linux"

    cef:bundle:
        desc: Bundle CEF binaries alongside the agentmux-cef executable.
        cmds:
            - task: cef:bundle:{{OS}}

    cef:bundle:windows:
        internal: true
        platforms: [windows]
        cmds:
            - cmd: |
                cefDir=$(find target/release -name 'libcef.dll' 2>/dev/null | head -1)
                [ -z "$cefDir" ] && cefDir=$(find target -name 'libcef.dll' 2>/dev/null | head -1)
                if [ -z "$cefDir" ]; then
                  echo "❌ libcef.dll not found in target/ — build agentmux-cef first"
                  exit 1
                fi
                cefDir=$(dirname "$cefDir")
                echo "Found CEF binaries in: $cefDir"
                mkdir -p dist/cef/locales
                # Core CEF DLLs (required)
                cp -f "$cefDir/libcef.dll" dist/cef/
                cp -f "$cefDir/chrome_elf.dll" dist/cef/ 2>/dev/null || true
                # GPU support (required — ANGLE + D3D compiler)
                cp -f "$cefDir/libEGL.dll" dist/cef/ 2>/dev/null || true
                cp -f "$cefDir/libGLESv2.dll" dist/cef/ 2>/dev/null || true
                cp -f "$cefDir/d3dcompiler_47.dll" dist/cef/ 2>/dev/null || true
                # CEF data files (required)
                cp -f "$cefDir/icudtl.dat" dist/cef/ 2>/dev/null || true
                cp -f "$cefDir/v8_context_snapshot.bin" dist/cef/ 2>/dev/null || true
                cp -f "$cefDir"/*.pak dist/cef/ 2>/dev/null || true
                # Locales — en-US only (saves ~18 MB)
                [ -f "$cefDir/locales/en-US.pak" ] && cp -f "$cefDir/locales/en-US.pak" dist/cef/locales/
                # SKIPPED (not needed, saves ~18 MB):
                #   vk_swiftshader.dll, vulkan-1.dll, vk_swiftshader_icd.json (SwiftShader — deprecated upstream)
                #   dxil.dll, dxcompiler.dll (WebGPU — not used)
                #   snapshot_blob.bin (removed in CEF 133+)
                #   49 non-English locale .pak files
                echo "✓ Bundled CEF binaries to dist/cef/ (optimized: GPU kept, SwiftShader/WebGPU/extra locales stripped)"

    cef:bundle:darwin:
        internal: true
        platforms: [darwin]
        cmds:
            - echo "macOS CEF bundling not yet implemented"

    cef:bundle:linux:
        internal: true
        platforms: [linux]
        cmds:
            - |
                CEF_DIR=$(find target -name "libcef.so" -path "*/cef-dll-sys*/out/*" -printf '%h' -quit 2>/dev/null)
                if [ -z "$CEF_DIR" ]; then
                  echo "❌ libcef.so not found in target/ — build agentmux-cef first"
                  exit 1
                fi
                echo "Found CEF binaries in: $CEF_DIR"
                mkdir -p dist/cef/locales
                cp -f "$CEF_DIR/libcef.so" dist/cef/
                cp -f "$CEF_DIR/libEGL.so" dist/cef/ 2>/dev/null || true
                cp -f "$CEF_DIR/libGLESv2.so" dist/cef/ 2>/dev/null || true
                cp -f "$CEF_DIR/chrome-sandbox" dist/cef/ 2>/dev/null || true
                cp -f "$CEF_DIR/icudtl.dat" dist/cef/
                cp -f "$CEF_DIR/v8_context_snapshot.bin" dist/cef/ 2>/dev/null || true
                cp -f "$CEF_DIR"/*.pak dist/cef/
                cp -f "$CEF_DIR/locales/en-US.pak" dist/cef/locales/ 2>/dev/null || true
                echo "✓ Bundled CEF runtime for Linux"

    cef:dev:
        desc: Build and run the CEF host in development mode (starts Vite + CEF host).
        cmds:
            - task: cef:build
            - task: cef:bundle
            - task: cef:dev:serve
        deps:
            - npm:install
            - build:backend
            - copy:schema
        env:
            AGENTMUX_ENVFILE: "{{.ROOT_DIR}}/.env"
            AGENTMUX_DEV: "1"

    cef:dev:serve:
        internal: true
        desc: Start Vite dev server and CEF host concurrently.
        cmds:
            - cmd: |
                # Gate on successful bundle — don't launch stale binaries
                CEF_EXE=$(ls dist/cef/agentmux-cef-*{{exeExt}} 2>/dev/null | head -1)
                if [ -z "$CEF_EXE" ]; then
                  echo "❌ No versioned agentmux-cef binary found in dist/cef/ — run task cef:build first"
                  ls dist/cef/ 2>/dev/null || echo "  (dist/cef/ does not exist)"
                  exit 1
                fi
                if [ ! -f dist/cef/libcef.dll ] && [ "{{OS}}" = "windows" ]; then
                  echo "❌ dist/cef/libcef.dll not found — run task cef:bundle first"
                  exit 1
                fi

                # Copy staging dir to session dir so dist/cef/ is never locked
                # by the running process. Next build can overwrite dist/cef/ freely.
                DEV_DIR="dist/cef-dev"
                rm -rf "$DEV_DIR"
                cp -r dist/cef "$DEV_DIR"
                echo "Copied dist/cef → $DEV_DIR (isolation)"

                # Find versioned binary in dev dir
                DEV_EXE=$(ls "$DEV_DIR"/agentmux-cef-*{{exeExt}} 2>/dev/null | head -1)

                npx vite --config vite.config.tauri.ts --port 5173 &
                VITE_PID=$!
                trap "kill $VITE_PID 2>/dev/null; rm -rf $DEV_DIR 2>/dev/null" EXIT
                echo "Waiting for Vite on port 5173 (pid $VITE_PID)..."
                for i in $(seq 1 30); do
                  curl -s http://localhost:5173 > /dev/null 2>&1 && break
                  sleep 1
                done
                if ! curl -s http://localhost:5173 > /dev/null 2>&1; then
                  echo "❌ Vite failed to start within 30 seconds"
                  exit 1
                fi
                echo "Vite ready."
                cd "$DEV_DIR" && LD_LIBRARY_PATH=. "$DEV_EXE" --url=http://localhost:5173

    cef:run:
        desc: Run the CEF host (must be built and bundled first).
        cmds:
            - task: cef:run:{{OS}}

    cef:run:windows:
        internal: true
        platforms: [windows]
        cmd: |
            CEF_EXE=$(ls dist/cef/agentmux-cef-*.exe 2>/dev/null | head -1)
            [ -z "$CEF_EXE" ] && echo "❌ No versioned agentmux-cef binary in dist/cef/" && exit 1
            cd dist/cef && cmd /c "$(basename $CEF_EXE) --url=http://localhost:5173"

    cef:run:darwin:
        internal: true
        platforms: [darwin]
        cmd: |
            CEF_EXE=$(ls dist/cef/agentmux-cef-* 2>/dev/null | head -1)
            [ -z "$CEF_EXE" ] && echo "❌ No versioned agentmux-cef binary in dist/cef/" && exit 1
            cd dist/cef && ./"$(basename $CEF_EXE)" --url=http://localhost:5173
    cef:run:linux:
        internal: true
        platforms: [linux]
        cmd: |
            CEF_EXE=$(ls dist/cef/agentmux-cef-* 2>/dev/null | head -1)
            [ -z "$CEF_EXE" ] && echo "❌ No versioned agentmux-cef binary in dist/cef/" && exit 1
            cd dist/cef && LD_LIBRARY_PATH=. ./"$(basename $CEF_EXE)" --url=http://localhost:5173
    cef:package:portable:
        desc: Package CEF build as a portable directory + ZIP (Windows). Outputs to ~/Desktop by default.
        platforms: [windows]
        cmds:
            - bash scripts/package-cef-portable.sh

    cef:clean:
        desc: Clean CEF build artifacts.
        cmds:
            - cmd: '{{.RMRF}} "dist/cef"'
              ignore_error: true
            - cmd: '{{.RMRF}} "dist/cef-dev"'
              ignore_error: true

    # ========================================
    # End CEF Tasks
    # ========================================

    test:e2e:macos:
        desc: Run E2E tests on macOS (frontend-only with mocked Tauri IPC)
        platforms: [darwin]
        deps:
            - npm:install
        cmds:
            - npx vite --config vite.config.tauri.ts &
            - sleep 5
            - npx wdio run wdio.macos.conf.cjs || EXIT_CODE=$?; kill %1 2>/dev/null; exit ${EXIT_CODE:-0}

    build:frontend:prod:
        desc: Build the frontend for production (used by Tauri)
        cmd: npx vite build --mode production --config vite.config.tauri.ts
        deps:
            - npm:install
        env:
            VITE_PLATFORM: "{{OS}}"
