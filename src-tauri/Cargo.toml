[package]
name = "agentmux"
version = "0.28.13"
description = "AgentMux - AI-Native Terminal"
authors = ["a5af"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "agentmux_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "devtools", "custom-protocol"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-notification = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-fs = "2"
tauri-plugin-opener = "2"
tauri-plugin-process = "2"
tauri-plugin-store = "2"
tauri-plugin-window-state = "2"
tauri-plugin-websocket = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
whoami = "1"
chrono = "0.4"
url = "2"

[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "s"

# Fast release profile for testing (much faster compile, slightly larger binary)
[profile.fast-release]
inherits = "release"
lto = "thin"        # Thin LTO - parallel and much faster than full LTO
codegen-units = 16  # Parallel codegen - uses multiple CPU cores
strip = true
opt-level = 2       # Still optimized, but not as aggressive as "s"
